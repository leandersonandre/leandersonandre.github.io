<div class="solucao">
    <div class="resposta">
        <!-- HEADER (só botão) -->
        <div class="resposta-header">
            <button
                type="button"
                onclick="
                    const body = this.parentElement.nextElementSibling;
                    body.classList.toggle('hidden');
                    this.textContent = body.classList.contains('hidden')
                        ? 'Mostrar solução'
                        : 'Ocultar solução';
                "
            >
                Mostrar solução
            </button>
        </div>

        <!-- BODY (resposta oculta) -->
        <div class="resposta-body hidden">
            <div class="resposta-titulo">
                Resposta correta: <strong>{{ .Params.letra }}</strong>
            </div>

            {{ .Inner }}
        </div>
    </div>
</div>
