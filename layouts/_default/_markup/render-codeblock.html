{{ if eq .Type "plantuml" }} {{ $user := .Inner | strings.TrimSpace }} {{
$format := "svg" }} {{ $id := printf "plantuml-%d" now.UnixNano }}

<div id="{{ $id }}"></div>
<script>
    (async function () {
        const diagram = `@startuml
!theme plain
skinparam shadowing false
skinparam monochrome true
skinparam classAttributeIconSize 0
hide stereotype
hide circle

{{ $user }}

@enduml`;

        const res = await fetch("https://kroki.io/plantuml/{{ $format }}", {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: diagram,
        });

        const output = await res.text();
        document.getElementById("{{ $id }}").innerHTML = output;
    })();
</script>
{{ else }} {{ highlight .Inner .Type "" }} {{ end }}
